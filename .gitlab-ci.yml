stages:
  - test

test:hooks:
  stage: test
  image: alpine:3.21
  before_script:
    - apk add --no-cache bash git
    - git config --global user.email "ci@test" && git config --global user.name "CI"
  script:
    - bash plugins/flowyeah/tests/test-hooks.sh

test:consistency:
  stage: test
  image: alpine:3.21
  before_script:
    - apk add --no-cache bash
  script:
    - bash plugins/flowyeah/tests/test-consistency.sh
